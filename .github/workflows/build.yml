name: Build DEB

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      arch:
        description: '目标架构'
        required: false
        default: 'arm64'
        type: string

env:
  DEB_NAME: com.autogo.daemon
  VERSION: 1.0.0

jobs:
  build:
    name: Build iOS DEB (arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null || \
          echo "Using default Xcode"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install tools
        run: |
          brew install ldid dpkg 2>/dev/null || true
          echo "--- dpkg-deb ---"
          which dpkg-deb 2>/dev/null || echo "dpkg-deb not found"

      - name: Compile
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK_PATH"

          mkdir -p build/obj

          # 编译所有 .m 文件
          OBJS=""
          for f in src/*.m; do
            NAME=$(basename "$f" .m)
            OBJ="build/obj/${NAME}.o"
            echo "编译 $f ..."
            clang -arch arm64 \
              -isysroot "$SDK_PATH" \
              -miphoneos-version-min=13.0 \
              -fobjc-arc \
              -fmodules \
              -Wno-deprecated-declarations \
              -c "$f" -o "$OBJ" || {
                echo "ERROR: 编译 $f 失败"
                exit 1
              }
            OBJS="$OBJS $OBJ"
          done

          echo "链接 ..."
          clang -arch arm64 \
            -isysroot "$SDK_PATH" \
            -miphoneos-version-min=13.0 \
            -framework Foundation \
            -framework CoreFoundation \
            -framework UIKit \
            -framework CoreGraphics \
            -framework IOKit \
            -framework Security \
            -ldl \
            $OBJS \
            -o build/ios-autogo

          # 签名
          ldid -S build/ios-autogo 2>/dev/null || echo "签名跳过"
          ls -lh build/ios-autogo
          file build/ios-autogo

      - name: Build DEB package
        run: |
          DEB_ROOT="build/deb_root"
          rm -rf "$DEB_ROOT"
          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/usr/bin"
          mkdir -p "$DEB_ROOT/Library/LaunchDaemons"
          mkdir -p "$DEB_ROOT/var/mobile/Documents/autogo/screenshots"
          mkdir -p "$DEB_ROOT/var/mobile/Documents/autogo/logs"

          cp build/ios-autogo "$DEB_ROOT/usr/bin/"
          chmod 755 "$DEB_ROOT/usr/bin/ios-autogo"
          cp DEBIAN/control "$DEB_ROOT/DEBIAN/"
          cp DEBIAN/postinst "$DEB_ROOT/DEBIAN/"
          cp DEBIAN/prerm "$DEB_ROOT/DEBIAN/"
          chmod 755 "$DEB_ROOT/DEBIAN/postinst" "$DEB_ROOT/DEBIAN/prerm"
          cp Library/LaunchDaemons/com.autogo.daemon.plist "$DEB_ROOT/Library/LaunchDaemons/"

          # 使用 dpkg-deb 打包 (如果可用)
          DEB_OUT="build/${DEB_NAME}_${VERSION}_iphoneos-arm.deb"
          if command -v dpkg-deb >/dev/null 2>&1; then
            dpkg-deb -b "$DEB_ROOT" "$DEB_OUT"
            echo "DEB (dpkg-deb): $DEB_OUT"
          else
            # fallback: ar + tar
            bash .github/scripts/mkdeb.sh "$DEB_ROOT" "$DEB_OUT"
            echo "DEB (ar): $DEB_OUT"
          fi

          ls -lh "$DEB_OUT"
          echo "deb_path=$DEB_OUT" >> $GITHUB_ENV

      - name: Upload DEB artifact
        if: env.deb_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: com.autogo.daemon-${{ github.sha }}
          path: ${{ env.deb_path }}
          retention-days: 90
          compression-level: 0

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.deb_path }}
          generate_release_notes: true
          name: "AutoGo Daemon v${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
