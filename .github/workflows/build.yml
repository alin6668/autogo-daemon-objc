name: Build DEB (Rootless)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      arch:
        description: '目标架构'
        required: false
        default: 'arm64'
        type: string

env:
  DEB_NAME: com.autogo.daemon
  VERSION: 1.0.0

jobs:
  build:
    name: Build iOS DEB (arm64+arm64e rootless)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null || \
          echo "Using default Xcode"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install tools
        run: |
          brew install ldid dpkg 2>/dev/null || true
          echo "--- dpkg-deb ---"
          which dpkg-deb 2>/dev/null || echo "dpkg-deb not found"

      - name: Compile
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK_PATH"

          mkdir -p build/obj

          LINK_FLAGS="-isysroot $SDK_PATH -miphoneos-version-min=15.0 -framework Foundation -framework CoreFoundation -framework UIKit -framework CoreGraphics -framework IOKit -framework Security -ldl"
          APP_LINK_FLAGS="-isysroot $SDK_PATH -miphoneos-version-min=15.0 -framework UIKit -framework Foundation -framework CoreGraphics"
          ARCH_LIST="arm64 arm64e"
          DAEMON_FAT="build/ios-autogo"
          APP_FAT="build/AutoGo"
          DAEMON_BINS=""
          APP_BINS=""

          # === 编译守护进程 (arm64 + arm64e fat binary) ===
          echo "=== 编译守护进程 (arm64 + arm64e fat) ==="
          for ARCH in $ARCH_LIST; do
            echo "--- 架构: $ARCH ---"
            OBJS=""
            for f in src/*.m; do
              NAME=$(basename "$f" .m)
              OBJ="build/obj/${NAME}_${ARCH}.o"
              echo "编译 $f ($ARCH)..."
              clang -arch "$ARCH" \
                -isysroot "$SDK_PATH" \
                -miphoneos-version-min=15.0 \
                -fobjc-arc \
                -fmodules \
                -Wno-deprecated-declarations \
                -c "$f" -o "$OBJ" || { echo "ERROR: 编译 $f 失败"; exit 1; }
              OBJS="$OBJS $OBJ"
            done

            BIN="build/ios-autogo_${ARCH}"
            echo "链接守护进程 ($ARCH)..."
            clang -arch "$ARCH" \
              -isysroot "$SDK_PATH" \
              -miphoneos-version-min=15.0 \
              -framework Foundation \
              -framework CoreFoundation \
              -framework UIKit \
              -framework CoreGraphics \
              -framework IOKit \
              -framework Security \
              -ldl \
              $OBJS \
              -o "$BIN"
            DAEMON_BINS="$DAEMON_BINS $BIN"
          done

          # 合并守护进程 fat binary
          lipo -create $DAEMON_BINS -output "$DAEMON_FAT"
          chmod 755 "$DAEMON_FAT"
          ldid -S "$DAEMON_FAT" 2>/dev/null || echo "守护进程签名跳过"
          ls -lh "$DAEMON_FAT"
          file "$DAEMON_FAT"

          # === 编译 Dashboard App (arm64 + arm64e fat binary, 带 entitlement 签名) ===
          echo "=== 编译 Dashboard App (arm64 + arm64e fat) ==="
          for ARCH in $ARCH_LIST; do
            echo "--- 架构: $ARCH ---"
            APP_OBJS=""
            for f in app/*.m; do
              NAME=$(basename "$f" .m)
              OBJ="build/obj/${NAME}_${ARCH}_app.o"
              echo "编译 $f ($ARCH)..."
              clang -arch "$ARCH" \
                -isysroot "$SDK_PATH" \
                -miphoneos-version-min=15.0 \
                -fobjc-arc \
                -fmodules \
                -fPIE \
                -Wno-deprecated-declarations \
                -Iapp \
                -c "$f" -o "$OBJ" || { echo "ERROR: 编译 $f 失败"; exit 1; }
              APP_OBJS="$APP_OBJS $OBJ"
            done

            BIN="build/AutoGo_${ARCH}"
            echo "链接 Dashboard App ($ARCH)..."
            clang -arch "$ARCH" \
              -isysroot "$SDK_PATH" \
              -miphoneos-version-min=15.0 \
              -pie \
              -framework UIKit \
              -framework Foundation \
              -framework CoreGraphics \
              $APP_OBJS \
              -o "$BIN"
            APP_BINS="$APP_BINS $BIN"
          done

          # 合并 App fat binary
          lipo -create $APP_BINS -output "$APP_FAT"
          chmod 755 "$APP_FAT"

          # 使用 entitlement 签名 (解决闪退问题)
          echo "签名 Dashboard App (entitlements)..."
          if [ -f app/entitlements.plist ]; then
            ldid -Sapp/entitlements.plist "$APP_FAT"
            echo "App 已使用 entitlements.plist 签名"
          else
            ldid -S "$APP_FAT" 2>/dev/null || echo "App 签名跳过"
          fi
          ls -lh "$APP_FAT"
          file "$APP_FAT"

      - name: Build DEB package
        run: |
          DEB_ROOT="build/deb_root"
          rm -rf "$DEB_ROOT"
          # Rootless 目录结构: 所有文件在包内即安装到 /var/jb/ 下
          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/var/jb/usr/bin"
          mkdir -p "$DEB_ROOT/var/jb/Library/LaunchDaemons"
          mkdir -p "$DEB_ROOT/var/jb/Applications/AutoGo.app"

          cp build/ios-autogo "$DEB_ROOT/var/jb/usr/bin/"
          chmod 755 "$DEB_ROOT/var/jb/usr/bin/ios-autogo"

          # Dashboard App (fat binary + signed with entitlements)
          cp build/AutoGo "$DEB_ROOT/var/jb/Applications/AutoGo.app/AutoGo"
          chmod 755 "$DEB_ROOT/var/jb/Applications/AutoGo.app/AutoGo"
          cp app/Info.plist "$DEB_ROOT/var/jb/Applications/AutoGo.app/Info.plist"
          cp app/entitlements.plist "$DEB_ROOT/var/jb/Applications/AutoGo.app/entitlements.plist"

          # 复制 App 图标 (解决白图标问题)
          if [ -f resources/META-INF/appicon.png ]; then
            cp resources/META-INF/appicon.png "$DEB_ROOT/var/jb/Applications/AutoGo.app/AppIcon60x60@2x.png"
            cp resources/META-INF/appicon.png "$DEB_ROOT/var/jb/Applications/AutoGo.app/AppIcon60x60.png"
            echo "App 图标已复制"
          else
            echo "警告: 未找到 appicon.png"
          fi

          cp DEBIAN/control "$DEB_ROOT/DEBIAN/"
          cp DEBIAN/postinst "$DEB_ROOT/DEBIAN/"
          cp DEBIAN/prerm "$DEB_ROOT/DEBIAN/"
          chmod 755 "$DEB_ROOT/DEBIAN/postinst" "$DEB_ROOT/DEBIAN/prerm"
          cp Library/LaunchDaemons/com.autogo.daemon.plist "$DEB_ROOT/var/jb/Library/LaunchDaemons/"

          # 使用 dpkg-deb 打包
          DEB_OUT="build/${DEB_NAME}_${VERSION}_iphoneos-arm64e.deb"
          if command -v dpkg-deb >/dev/null 2>&1; then
            dpkg-deb -b "$DEB_ROOT" "$DEB_OUT"
            echo "DEB (dpkg-deb): $DEB_OUT"
          else
            # fallback: ar + tar
            bash .github/scripts/mkdeb.sh "$DEB_ROOT" "$DEB_OUT"
            echo "DEB (ar): $DEB_OUT"
          fi

          ls -lh "$DEB_OUT"
          echo "deb_path=$DEB_OUT" >> $GITHUB_ENV

      - name: Upload DEB artifact
        if: env.deb_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: com.autogo.daemon-${{ github.sha }}
          path: ${{ env.deb_path }}
          retention-days: 90
          compression-level: 0

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.deb_path }}
          generate_release_notes: true
          name: "AutoGo Daemon v${{ github.ref_name }} (Rootless)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
