name: Build DEB

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      arch:
        description: '目标架构'
        required: false
        default: 'arm64 arm64e'
        type: string

env:
  DEB_NAME: com.autogo.daemon
  VERSION: 1.0.0

jobs:
  build:
    name: Build iOS DEB (arm64 + arm64e)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null || \
          echo "Using default Xcode"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install theos
        run: |
          # 安装 theos 依赖 (dpkg-deb 是 dm.pl 的依赖)
          brew install make ldid xz dpkg 2>/dev/null || true
          
          # 克隆 theos
          THEOS_DIR="$HOME/theos"
          if [ ! -d "$THEOS_DIR" ]; then
            git clone --depth 1 https://github.com/theos/theos.git "$THEOS_DIR"
          else
            cd "$THEOS_DIR" && git pull
          fi
          
          # 安装 SDK headers
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz
          mkdir -p "$THEOS_DIR/sdks"
          tar -xf iPhoneOS16.5.sdk.tar.xz -C "$THEOS_DIR/sdks" 2>/dev/null || true
          
          # 验证
          ls "$THEOS_DIR/sdks/"
          dpkg-deb --version 2>/dev/null && echo "dpkg-deb OK" || echo "dpkg-deb NOT FOUND"
          echo "THEOS=$THEOS_DIR" >> $GITHUB_ENV

      - name: Compile
        run: |
          export THEOS="$HOME/theos"
          export SDKVERSION="16.5"
          make package FINALPACKAGE=1

      - name: Verify DEB
        run: |
          echo "=== 查找 DEB 包 ==="
          find . -name "*.deb" -type f 2>/dev/null || find packages -name "*.deb" -type f 2>/dev/null
          
          DEB_PATH=$(find . packages -name "*.deb" -type f 2>/dev/null | head -1)
          if [ -z "$DEB_PATH" ]; then
            echo "警告: 未找到 DEB, 检查 build 产物..."
            ls -la packages/ 2>/dev/null || ls -la .theos/ 2>/dev/null || true
          else
            echo "DEB 找到: $DEB_PATH"
            ls -lh "$DEB_PATH"
            echo "deb_path=$DEB_PATH" >> $GITHUB_ENV
          fi

      - name: Upload DEB artifact
        if: env.deb_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: com.autogo.daemon-${{ github.sha }}
          path: ${{ env.deb_path }}
          retention-days: 90
          compression-level: 0

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.deb_path }}
          generate_release_notes: true
          name: "AutoGo Daemon v${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 备用: 使用 clang 手动编译 (不依赖 theos)
  build-clang:
    name: Build with clang (fallback)
    runs-on: macos-14
    if: failure()
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile with clang
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK_PATH"
          
          mkdir -p build/obj
          
          # 编译所有源文件
          OBJS=""
          for f in src/*.m; do
            NAME=$(basename "$f" .m)
            OBJ="build/obj/${NAME}.o"
            echo "编译 $f ..."
            clang -arch arm64 \
              -isysroot "$SDK_PATH" \
              -miphoneos-version-min=13.0 \
              -fobjc-arc \
              -fmodules \
              -c "$f" -o "$OBJ"
            OBJS="$OBJS $OBJ"
          done
          
          echo "链接 ..."
          clang -arch arm64 \
            -isysroot "$SDK_PATH" \
            -miphoneos-version-min=13.0 \
            -framework Foundation \
            -framework CoreFoundation \
            -framework UIKit \
            -framework CoreGraphics \
            -framework IOKit \
            -framework Security \
            -ldl \
            $OBJS \
            -o build/ios-autogo
          
          # 签名
          ldid -S build/ios-autogo 2>/dev/null || echo "签名为空(ldid 可能不可用)"
          
          ls -lh build/ios-autogo
          file build/ios-autogo

      - name: Build DEB
        run: |
          DEB_ROOT="build/deb_root"
          rm -rf "$DEB_ROOT"
          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/usr/bin"
          mkdir -p "$DEB_ROOT/Library/LaunchDaemons"
          mkdir -p "$DEB_ROOT/var/mobile/Documents/autogo/screenshots"
          mkdir -p "$DEB_ROOT/var/mobile/Documents/autogo/logs"
          
          cp build/ios-autogo "$DEB_ROOT/usr/bin/"
          chmod 755 "$DEB_ROOT/usr/bin/ios-autogo"
          cp DEBIAN/control "$DEB_ROOT/DEBIAN/"
          cp DEBIAN/postinst "$DEB_ROOT/DEBIAN/"
          cp DEBIAN/prerm "$DEB_ROOT/DEBIAN/"
          chmod 755 "$DEB_ROOT/DEBIAN/postinst" "$DEB_ROOT/DEBIAN/prerm"
          cp Library/LaunchDaemons/com.autogo.daemon.plist "$DEB_ROOT/Library/LaunchDaemons/"
          
          # md5sums
          (cd "$DEB_ROOT" && find . -type f ! -path './DEBIAN/*' -exec md5 -q {} \; | sort -k2) > "$DEB_ROOT/DEBIAN/md5sums" 2>/dev/null || true
          
          .github/scripts/mkdeb.sh "$DEB_ROOT" "build/com.autogo.daemon_1.0.0_iphoneos-arm.deb"
          
          ls -lh build/*.deb
          echo "deb_path=$(find build -name "*.deb" -type f | head -1)" >> $GITHUB_ENV

      - name: Upload DEB artifact (fallback)
        if: env.deb_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: com.autogo.daemon-clang-${{ github.sha }}
          path: ${{ env.deb_path }}
          retention-days: 90
